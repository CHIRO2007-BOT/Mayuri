<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proposal ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    color: white;
    text-align: center;
}

.container {
    margin-top: 15%;
}

h1 {
    font-size: 50px;
}

p {
    font-size: 22px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.yes { background: green; color: white; }
.no { background: red; color: white; }
.music { background: white; color: #ff4d6d; }
</style>
</head>

<body>

<!-- 🎵 SONG -->
<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <h1>❤️ I Have Something For You ❤️</h1>
    <p>Will you be mine?</p>

    <button class="yes" onclick="alert('❤️ You said YES!')">YES</button>
    <button class="no" onclick="alert('💔 Okay...')">NO</button>

    <br><br>

    <button class="music" onclick="document.getElementById('song').play()">
        🎵 Play Music
    </button>

</div>

</body>
</html>
