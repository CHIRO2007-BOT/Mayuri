


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    text-align: center;
    color: white;
}

.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
}

h1 {
    font-size: 40px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 10px;
}

#yes {
    background: green;
    color: white;
}

#no {
    background: red;
    color: white;
    position: absolute;
}

/* hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>❤️ Will you be mine? ❤️</h1>

    <button id="yes" onclick="alert('💖 Yay! You said YES!')">YES</button>
    <button id="no">NO</button>

    <br><br>

    <button onclick="document.getElementById('song').play()">
        🎵 Play Music
    </button>
</div>

<script>

// 🎵 play music on click anywhere
document.body.addEventListener("click", function(){
    document.getElementById("song").play();
});

// 💖 floating hearts
setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
}, 300);

// 😏 runaway NO button
let noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
</script>

</body>
</html>
