<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    color: white;
    text-align: center;
}

/* Main box */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.3);
    padding: 40px;
    border-radius: 20px;
    z-index: 10;
}

h1 {
    font-size: 40px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.yes { background: #00c853; color: white; }
.no { background: #d50000; color: white; }

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* Roses */
.rose {
    position: absolute;
    font-size: 25px;
    animation: float 8s linear infinite;
}

/* Fireworks */
.spark {
    position: absolute;
    width: 6px;
    height: 6px;
    background: yellow;
    border-radius: 50%;
    animation: boom 1s infinite;
}

@keyframes boom {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>❤️ I Have Something For You ❤️</h1>
    <p>Will you be mine forever?</p>

    <button class="yes" onclick="alert('💖 You made me the happiest person!')">YES</button>
    <button class="no" onclick="alert('💔 I will still try for you...')">NO</button>

    <br><br>

    <button onclick="document.getElementById('song').play()">
        🎵 Play Music
    </button>
</div>

<script>
// 🎵 auto play on click anywhere
document.body.addEventListener("click", function(){
    document.getElementById("song").play();
});

// 💖 hearts
function hearts() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(hearts, 300);

// 🌹 roses
function roses() {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerHTML = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(rose);

    setTimeout(() => rose.remove(), 8000);
}
setInterval(roses, 500);
</script>

</body>
</html>
