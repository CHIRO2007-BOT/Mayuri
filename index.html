<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayuri ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ffb3c6,#ff758f);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
text-align:center;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.15);
padding:35px;
border-radius:25px;
backdrop-filter:blur(12px);
box-shadow:0 0 30px rgba(255,255,255,.3);
z-index:10;
max-width:650px;
}

h1{
font-size:3rem;
color:white;
margin-bottom:15px;
}
<audio id="bgmusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('bgmusic').play()">▶ Play</button>
<button onclick="document.getElementById('bgmusic').pause()">⏸ Pause</button>
h2{
color:white;
margin-bottom:25px;
min-height:50px;
}

button{
padding:14px 35px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#ff006e;
color:white;
box-shadow:0 0 20px #ff006e;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #ff006e;}
to{box-shadow:0 0 35px #ff006e;}
}

#no{
background:white;
color:#ff006e;
}

#message{
display:none;
color:white;
font-size:1.3rem;
line-height:1.8;
margin-top:20px;
}

.heart{
position:absolute;
pointer-events:none;
animation:float 6s linear forwards;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

.petal{
position:absolute;
font-size:24px;
pointer-events:none;
animation:fall 8s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Mayuri ❤️</h1>

<h2 id="typewriter"></h2>

<button id="yes" onclick="yesClick()">Yes ❤️</button>

<button id="no">No 😢</button>

<div id="message">

❤️ Dear Mayuri ❤️

<br><br>

You just made Shivam the happiest person alive.

<br><br>

Every smile of yours brightens my day.
Every moment with you becomes a beautiful memory.

<br><br>

I don't know what the future holds,
but I know I want you in it.

<br><br>

Will you stay by my side forever?

<br><br>

Forever Yours,<br>
Shivam ❤️

</div>

</div>

<script>

// TYPEWRITER
const text="Mayuri, will you be mine forever? ❤️";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typewriter").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,80);
}
}

window.onload=typeWriter;


// FLOATING HEARTS
setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},250);


// FALLING ROSES
setInterval(()=>{

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌹";

petal.style.left=Math.random()*100+"vw";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},8000);

},700);


// MOVING NO BUTTON
const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{

noBtn.style.position="absolute";

noBtn.style.left=
Math.random()*(window.innerWidth-120)+"px";

noBtn.style.top=
Math.random()*(window.innerHeight-60)+"px";

});


// YES BUTTON
function yesClick(){

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";

document.getElementById("message").style.display="block";

for(let i=0;i<350;i++){

const spark=document.createElement("div");

spark.style.position="absolute";
spark.style.width="12px";
spark.style.height="12px";
spark.style.borderRadius="50%";

const colors=[
"#ff006e",
"#ffbe0b",
"#fb5607",
"#8338ec",
"#3a86ff",
"white"
];

spark.style.background=
colors[Math.floor(Math.random()*colors.length)];

spark.style.left="50%";
spark.style.top="50%";

document.body.appendChild(spark);

const x=(Math.random()-0.5)*1400;
const y=(Math.random()-0.5)*1400;

spark.animate(
[
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],
{
duration:3000
}
);

setTimeout(()=>{
spark.remove();
},3000);

}

}

</script>

</body>
</html>
