<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Website 💖</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        color: white;
        text-align: center;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .box {
        background: rgba(0,0,0,0.3);
        padding: 25px;
        border-radius: 15px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
    }

    .yes {
        background-color: #4CAF50;
        color: white;
    }

    .no {
        background-color: #f44336;
        color: white;
    }
</style>
</head>

<body>

<h1>💖 I Have a Question 💖</h1>

<div class="box">
    <p>Will you be mine? 💕</p>

    <button class="yes" onclick="yesClicked()">Yes 💖</button>
    <button class="no" onclick="noClicked()">No 💔</button>

    <p id="message"></p>

    <br><br>

    <audio controls autoplay loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function yesClicked() {
    document.getElementById("message").innerHTML =
        "Yayyy 💖 You made me the happiest person!";
}

function noClicked() {
    document.getElementById("message").innerHTML =
        "Ohh 💔 It's okay... maybe next time.";
}
</script>

</body>
</html>
