<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    color: white;
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h1 {
    font-size: 40px;
}

p {
    font-size: 20px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

.yes {
    background: #00c853;
    color: white;
}

.no {
    background: #d50000;
    color: white;
}

.music-btn {
    background: white;
    color: #ff4d6d;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>❤️ I Have Something For You ❤️</h1>
    <p>Will you be mine forever?</p>

    <button class="yes" onclick="alert('Yay! ❤️ You made me the happiest person!')">YES 💖</button>
    <button class="no" onclick="alert('I will keep trying ❤️')">NO 💔</button>

    <br>

    <button class="music-btn" onclick="document.getElementById('song').play()">
        🎵 Play Music
    </button>
</div>

</body>
</html>
